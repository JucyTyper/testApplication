name: Build and Deploy .NET App

on:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: apniapp
  AZURE_RESOURCE_GROUP: apniapp_group
  DOTNET_VERSION: '8.0.x'

defaults:
  run:
    working-directory: myWebApi

permissions:
  id-token: write
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build Application
      run: dotnet build --configuration Release --no-restore

    - name: Publish Application
      run: dotnet publish -c Release -o publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dotnet-app
        path: myWebApi/publish

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build

    steps:

    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: dotnet-app
        path: publish

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy to Staging Slot
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        slot-name: prod
        package: publish

  swap-to-production:
    runs-on: ubuntu-latest
    needs: deploy-staging

    environment:
    name: production

    steps:

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Swap Staging Slot to Production
      run: |
        az webapp deployment slot swap \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --name ${{ env.AZURE_WEBAPP_NAME }} \
          --slot apniapp-prod \
          --target-slot production

    - name: Production Health Check
      run: |
        curl -f https://apniapp-prod-dhgfaebsa9ayfyhs.canadacentral-01.azurewebsites.net/ping
